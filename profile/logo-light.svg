<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7DD9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4754E0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1-light)" />

  <!-- MCP-B Letters -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    MCP-B
  </text>

  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="8" fill="white" opacity="0.3" />
  <circle cx="150" cy="50" r="6" fill="white" opacity="0.3" />
  <circle cx="50" cy="150" r="6" fill="white" opacity="0.3" />
  <circle cx="150" cy="150" r="8" fill="white" opacity="0.3" />
</svg>
